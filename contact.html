<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Arsh</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root{
    --ink:#14171c;
    --ink-2:#1b1f26;
    --paper:#ede7dd;
    --paper-dim:#a9a49b;
    --rust:#b5642c;
    --line: rgba(237,231,221,0.12);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--ink); color:var(--paper); font-family:'Inter', sans-serif; -webkit-font-smoothing:antialiased; min-height:100vh; display:flex; flex-direction:column; }
  a{ color:inherit; }
  ::selection{ background:var(--rust); color:var(--ink); }

  nav{
    position:sticky; top:0; z-index:100;
    display:flex; justify-content:space-between; align-items:center;
    padding:1.6rem clamp(1.5rem, 5vw, 4rem);
    background:rgba(20,23,28,0.9);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line);
  }
  .nav-mark{ font-family:'Fraunces', serif; font-size:1.1rem; font-weight:500; }
  .nav-links{ display:flex; gap:clamp(1rem,3vw,2.4rem); font-size:0.8rem; letter-spacing:0.08em; text-transform:uppercase; }
  .nav-links a{ text-decoration:none; opacity:0.8; transition:opacity 0.2s; }
  .nav-links a:hover, .nav-links a.active{ opacity:1; color:var(--rust); }

  .contact-main{
    flex:1;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    padding:6rem clamp(1.5rem,5vw,4rem);
  }
  .eyebrow{ font-family:'IBM Plex Mono', monospace; font-size:0.78rem; color:var(--rust); letter-spacing:0.12em; text-transform:uppercase; margin-bottom:1.4rem; }
  .eyebrow::before{ content:'● '; }
  .contact-title{
    font-family:'Fraunces', serif; font-weight:300;
    font-size:clamp(2rem,7vw,4.2rem);
    max-width:16ch; line-height:1.05; margin-bottom:1.6rem;
  }
  .contact-title em{ color:var(--rust); font-style:italic; }
  .contact-sub{ color:var(--paper-dim); max-width:36ch; line-height:1.6; margin-bottom:3rem; }

  .contact-links{
    display:flex; gap:2.2rem; flex-wrap:wrap; justify-content:center;
    font-family:'IBM Plex Mono', monospace; font-size:0.9rem;
  }
  .contact-links a{
    text-decoration:none; border-bottom:1px solid var(--line); padding-bottom:0.35rem;
    transition:border-color 0.2s, color 0.2s;
  }
  .contact-links a:hover{ border-color:var(--rust); color:var(--rust); }

  footer{
    padding:2rem clamp(1.5rem,5vw,4rem);
    display:flex; justify-content:space-between;
    font-family:'IBM Plex Mono', monospace; font-size:0.7rem; color:var(--paper-dim);
    border-top:1px solid var(--line);
  }
</style>
</head>
<body>

<nav>
  <div class="nav-mark">A.S.</div>
  <div class="nav-links">
    <a href="index.html">Work</a>
    <a href="blog.html">Journal</a>
    <a href="about.html">About</a>
    <a href="contact.html" class="active">Contact</a>
  </div>
</nav>

<section class="contact-main">
  <div class="eyebrow">Contact</div>
  <h1 class="contact-title">Have a project in mind? <em>Let's talk.</em></h1>
  <p class="contact-sub">Open to shoots, collaborations, or just talking gear. Reach out through any of these.</p>
  <div class="contact-links">
    <a href="mailto:you@example.com">you@example.com</a>
    <a href="https://instagram.com/yourhandle" target="_blank" rel="noopener">Instagram</a>
    <a href="#" target="_blank" rel="noopener">Behance</a>
  </div>
</section>

<footer>
  <span>© 2026 Arsh</span>
  <span>Built &amp; hosted for free</span>
</footer>

</body>
</html>
